name: Daily PDCA Brief

on:
  schedule:
    # 00:00 UTC = 09:00 KST (Korea has no DST, so this is stable)
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why you are running this manually"
        required: false
        default: "ad-hoc"

permissions:
  contents: write
  issues: write

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  brief:
    name: Pull signals + (optional) GA brief
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: analytics/package-lock.json

      # Two-stage gate:
      #   has_ga=true  → run GA snapshot + brief (requires both secrets)
      #   has_ga=false → still run trend_pull (no auth needed) and commit
      - name: Detect GA secrets
        id: gate
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA_SERVICE_ACCOUNT_JSON: ${{ secrets.GA_SERVICE_ACCOUNT_JSON }}
        run: |
          if [[ -n "$GA4_PROPERTY_ID" && -n "$GA_SERVICE_ACCOUNT_JSON" ]]; then
            echo "has_ga=true" >> "$GITHUB_OUTPUT"
            echo "GA secrets present — full PDCA run."
          else
            echo "has_ga=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GA secrets missing — trend_pull only. Set GA4_PROPERTY_ID + GA_SERVICE_ACCOUNT_JSON to unlock daily_brief."
          fi

      - name: Install analytics deps
        working-directory: analytics
        run: |
          if [[ -f package-lock.json ]]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Materialize service account
        if: steps.gate.outputs.has_ga == 'true'
        working-directory: analytics
        env:
          GA_SERVICE_ACCOUNT_JSON: ${{ secrets.GA_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$GA_SERVICE_ACCOUNT_JSON" > service-account.json
          node -e "JSON.parse(require('fs').readFileSync('service-account.json','utf8'))"

      - name: Pull GA4 snapshot
        if: steps.gate.outputs.has_ga == 'true'
        working-directory: analytics
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
        run: node ga_client.mjs

      - name: Pull trend signals (Reddit + Wikipedia + optional YouTube)
        working-directory: analytics
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node trend_pull.mjs --no-twitter
        continue-on-error: true

      - name: Generate brief
        if: steps.gate.outputs.has_ga == 'true'
        id: brief
        working-directory: analytics
        run: |
          set +e
          node daily_brief.mjs
          status=$?
          today=$(date -u +%Y-%m-%d)
          echo "today=$today" >> "$GITHUB_OUTPUT"
          if [[ $status -eq 2 ]]; then
            echo "triggers=true" >> "$GITHUB_OUTPUT"
          elif [[ $status -ne 0 ]]; then
            echo "::error::daily_brief failed with exit $status"
            exit $status
          fi

      - name: Commit signal/brief artifacts
        run: |
          rm -f analytics/service-account.json
          git config user.name "kpop-pdca-bot"
          git config user.email "actions@users.noreply.github.com"
          today=$(date -u +%Y-%m-%d)
          git add analytics/trends/ meetings/briefings/ analytics/daily/ || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            msg="chore(pdca): daily signals ${today}"
            if [[ "${{ steps.gate.outputs.has_ga }}" == "true" ]]; then
              msg="chore(pdca): daily brief + signals ${today}"
            fi
            git commit -m "${msg}"
            git push
          fi

      - name: Open issue when self-correction triggers fired
        if: steps.gate.outputs.has_ga == 'true' && steps.brief.outputs.triggers == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          today=${{ steps.brief.outputs.today }}
          body_file=meetings/briefings/${today}.md
          if [[ -f "$body_file" ]]; then
            gh issue create \
              --title "PDCA self-correction trigger fired (${today})" \
              --label "pdca,seth-godin-review" \
              --body-file "$body_file" || true
          fi
